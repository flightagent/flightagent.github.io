<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Joystick Tester | Flight Agent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Test your flight simulation hardware via WebUSB. Identify Vendor and Product IDs with visual feedback.">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00a2ff;
            --accent-glow: rgba(0, 162, 255, 0.3);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            flex-grow: 1;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .btn-connect {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-connect:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .device-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.4s ease;
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .device-card:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
        }

        .device-image {
            width: 100%;
            height: 180px;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .device-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .device-info {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .badge {
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
            margin: 0 5px;
        }

        .empty-state {
            text-align: center;
            padding: 80px;
            color: var(--text-dim);
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            grid-column: 1 / -1;
        }

        footer {
            padding: 40px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .unsupported {
            background: #ff4757;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Hardware Diagnostics</h1>
        <p class="subtitle">Real-time USB Device Identification for Flight Simulation</p>
    </header>

    <div id="unsupported" class="unsupported">
        ⚠️ WebUSB is not supported in your browser. Please use Chrome, Edge, or Opera.
    </div>

    <div class="controls">
        <button id="btnConnect" class="btn-connect">Scan for Joysticks</button>
    </div>

    <div id="deviceGrid" class="device-grid">
        <div class="empty-state">
            <p>No devices connected yet. Click the button above to start.</p>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Flight Agent Organization. <a href="../" style="color: var(--accent); text-decoration: none;">Back to Home</a></p>
</footer>

<script src="tester.js"></script>
</body>
</html>
